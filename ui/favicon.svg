<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Back document (removal side) -->
  <g transform="translate(10, 12)">
    <path d="M0 4 Q0 0 4 0 L22 0 L30 8 L30 36 Q30 40 26 40 L4 40 Q0 40 0 36 Z" fill="none" stroke="#e06c75" stroke-width="2.5" opacity="0.7"/>
    <!-- Minus symbol -->
    <rect x="9" y="18" width="12" height="3" rx="1.5" fill="#e06c75" opacity="0.9"/>
  </g>
  <!-- Front document (addition side) -->
  <g transform="translate(24, 16)">
    <path d="M0 4 Q0 0 4 0 L22 0 L30 8 L30 36 Q30 40 26 40 L4 40 Q0 40 0 36 Z" fill="#0d1117" stroke="#61afef" stroke-width="2.5"/>
    <path d="M22 0 L22 4 Q22 8 26 8 L30 8" fill="none" stroke="#61afef" stroke-width="2" opacity="0.5"/>
    <!-- Plus symbol -->
    <rect x="9" y="18" width="12" height="3" rx="1.5" fill="#61afef"/>
    <rect x="13.5" y="13.5" width="3" height="12" rx="1.5" fill="#61afef"/>
  </g>
</svg>
